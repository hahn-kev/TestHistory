name: CI

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

env:
  # Image is pushed to ghcr.io/<owner>/<repo>, lowercased for GHCR.
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write # let the upload step publish the TestHistory run check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        # Emit JUnit XML alongside the normal console output so we can upload it.
        # vitest writes the report even when tests fail, so failures still get recorded.
        run: npm run test -w server -- --reporter=default --reporter=junit --outputFile.junit=test-results/junit.xml

      - name: Upload test results to TestHistory
        # Run even when tests failed (that's the point) — but skip if the repo
        # hasn't been configured, e.g. forked PRs with no access to the variables.
        if: ${{ !cancelled() && vars.TESTHISTORY_PROJECT_ID != '' }}
        uses: ./.github/actions/upload-results
        with:
          server-url: ${{ vars.TESTHISTORY_SERVER_URL }}
          project-id: ${{ vars.TESTHISTORY_PROJECT_ID }}
          api-token: ${{ secrets.TESTHISTORY_TOKEN }}
          files: '**/test-results/junit.xml'
          on-no-files: ignore

  publish:
    name: Publish image to GHCR
    runs-on: ubuntu-latest
    needs: test
    # Only publish on pushes to master or version tags — never on PRs.
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
