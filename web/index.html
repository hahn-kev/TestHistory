<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TestHistory</title>
    <script>
      // Pre-paint: apply the saved theme before first render to avoid a flash.
      (function () {
        try {
          document.documentElement.dataset.theme = localStorage.getItem('th-theme') || 'light';
        } catch (e) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
